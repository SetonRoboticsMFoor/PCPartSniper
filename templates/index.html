<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Part Sniper</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>PC Part Sniper</h1>
        
        <div class="selection-grid">
            <label>Category</label>
            <select id="category-select">
                <option value="">-- Select Category --</option>
            </select>

            <label>Brand</label>
            <select id="brand-select" disabled>
                <option value="">-- Select Brand --</option>
            </select>

            <label>Model</label>
            <select id="model-select" disabled>
                <option value="">-- Select Model --</option>
            </select>
        </div>

        <section id="price-display" class="hidden">
            <div class="header-row">
                <h2>Prices for <span id="selected-part-name"></span></h2>
                <button id="save-part-btn">Save to Watchlist</button>
            </div>
            <ul id="price-results"></ul>
        </section>

        <hr>

        <section id="saved-parts-section">
            <h2>Your Watchlist</h2>
            <div id="saved-parts-list"></div>
        </section>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
